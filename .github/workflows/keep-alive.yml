name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        env:
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL }}
        run: |
          if [ -z "$KEEP_ALIVE_URL" ]; then
            echo "Missing KEEP_ALIVE_URL secret"
            exit 1
          fi
          curl -fSL "$KEEP_ALIVE_URL"
